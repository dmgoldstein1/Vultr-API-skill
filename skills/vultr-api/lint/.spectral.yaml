# Generated by Copilot (GPT-5.3-Codex): Spectral rules tailored to Vultr OpenAPI validation.

extends:
  - [spectral:oas, off]

rules:
  vultr-server-url:
    description: Vultr API specs must target the official v2 base URL.
    severity: error
    given: $.servers[*].url
    then:
      function: pattern
      functionOptions:
        match: ^https://api\.vultr\.com/v2/?$

  vultr-api-key-security-scheme-exists:
    description: Vultr API spec must define the API Key bearer security scheme.
    severity: error
    given: $.components.securitySchemes["API Key"]
    then:
      function: schema
      functionOptions:
        schema:
          type: object
          required: [type, scheme]
          properties:
            type:
              const: http
            scheme:
              const: bearer

  vultr-operation-id-required:
    description: Every HTTP operation should define operationId.
    severity: warn
    given:
      - $.paths[*].get
      - $.paths[*].post
      - $.paths[*].put
      - $.paths[*].patch
      - $.paths[*].delete
    then:
      field: operationId
      function: truthy

  vultr-tag-required:
    description: Every operation should include at least one tag for routing.
    severity: warn
    given:
      - $.paths[*].get
      - $.paths[*].post
      - $.paths[*].put
      - $.paths[*].patch
      - $.paths[*].delete
    then:
      field: tags
      function: truthy

  vultr-auth-required-per-operation:
    description: Operations should explicitly include security requirements.
    severity: warn
    given:
      - $.paths[*].get
      - $.paths[*].post
      - $.paths[*].put
      - $.paths[*].patch
      - $.paths[*].delete
    then:
      field: security
      function: truthy
